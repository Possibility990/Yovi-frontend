<body>

<div class="verify-container">
    <div class="icon-wrapper">
        <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
    </div>

    <div class="header">
        <h2>Check your phone</h2>
        <p>We sent a 6-digit verification code to</p>
        <span class="phone-number">+234 0812 345 6789</span>
        <a href="#" class="change-link">Change number</a>
    </div>

    <div class="card">
        <div class="card-label">Enter 6-digit code</div>
        
        <div class="otp-inputs" id="otp-inputs">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
            <input type="text" class="otp-input" maxlength="1" pattern="[0-9]*" inputmode="numeric">
        </div>

        <button class="verify-btn" id="verify-btn">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
           <a href="./account-type.html"> Verify & Continue</a>
        </button>

        <div class="resend-text">
            Resend code in <span id="timer">54s</span>
        </div>

        <div class="alternative-box">
            Didn't get it? Check spam or
            <a href="#">verify via email instead</a>
        </div>
    </div>

    <a href="signup.html" class="back-link">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        Back to sign up
    </a>
</div>
